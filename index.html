<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Boggle Game</title>
    <link rel="stylesheet" href="style/styles.css">
</head>

<body>
    
    <div class="game-layout">
        <section class="right-words-container">
        <div class="words">
            <span>Right Words</span>
            <ul id="right-list">
            </ul>
        </div>
    </section>

    <section class="board-container">
        <div class="clock-container">
            <div id="clockdiv">
                <div>
                    <span class="minutes">00</span>
                    <div class="smalltext">Minutes</div>
                </div>
                <div>
                    <span class="seconds">00</span>
                    <div class="smalltext">Seconds</div>
                </div>
            </div>
        </div>
        <br>
        <br>
        <div class="game-controls">
            <div class="button-row">
                <span id='start-game' class='btn-primary'>Start Game</span>
                <span id='reset-turn' class='btn-secondary'>Reset</span>
                <span id='random-board' class='btn-secondary'>Random Board</span>
                <label class='toggle-label'>
                    <input id='auto-submit-toggle' type='checkbox'> Auto submit on release
                </label>
            </div>
            <div class="score-row">
                <div id='points' class='total'>0 Point(s)</div>
                <div id='high-score' class='total'>High Score: 0</div>
            </div>
            <div id="board"></div>
            <div class="word-entry">
                <input id='entered' class="word" type='text' placeholder="type and press return...">
                <span id='add-word' class='btn-primary'>Add Word</span>
            </div>
        </div>
        <div id="error-msg"></div>
    </section>

    <section class="wrong-words-container">
        <div class="words">
            <span>Wrong Words</span>
            <ul id="wrong-list">
            </ul>
        </div>
    </section>
    </div>

    <script type="module" src="/js/app.js"></script>
</body>

</html>
