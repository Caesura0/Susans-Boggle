<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Susan's Boggle</title>
  <script type="module" crossorigin src="/assets/index-3LXw5zmE.js"></script>
  <link rel="stylesheet" crossorigin href="/assets/index-C5RcnlTn.css">
</head>

<body>
    <header class="game-header">
        <h1 class="game-title">Susan's</h1>
        <div class="logo">
            <span>B</span><span>O</span><span>G</span><span>G</span><span>L</span><span>E</span>
        </div>
        <p class="subtitle">Word Search Challenge</p>
        <button id="theme-toggle" class="theme-btn" aria-label="Toggle Theme">
            <span class="theme-icon">🌙</span>
        </button>
    </header>

    <main class="game-layout">
        <!-- LEFT Pane: Boggle Game Console -->
        <section class="game-console glass-panel">
            <div class="clock-container">
                <div id="clockdiv">
                    <div class="time-block">
                        <span class="minutes">00</span>
                        <div class="smalltext">Min</div>
                    </div>
                    <div class="clock-colon">:</div>
                    <div class="time-block">
                        <span class="seconds">00</span>
                        <div class="smalltext">Sec</div>
                    </div>
                </div>
            </div>
            
            <div class="board-wrapper">
                <div id="board"></div>
                <div class="board-overlay">
                    <span id='start-game' class='btn-primary pulse'>Start Game</span>
                </div>
            </div>
            
            <div class="word-entry">
                <input id='entered' class="word" type='text' placeholder="Type or swipe tiles...">
                <span id='add-word' class='btn-primary'>Add Word</span>
            </div>
            <div id="error-msg"></div>
        </section>

        <!-- RIGHT Pane: Stats & Controls Dashboard -->
        <section class="dashboard glass-panel">
            <div class="stats-row">
                <div id='points' class='badge total'>0 Points</div>
                <div id='high-score' class='badge high-score'>High Score: 0</div>
            </div>

            <div class="game-controls">
                <div class="button-row">
                    <span id='reset-turn' class='btn-secondary'>Reset</span>
                    <span id='random-board' class='btn-secondary'>Random Board</span>
                </div>
                <label class='toggle-label'>
                    <input id='auto-submit-toggle' type='checkbox'> Auto submit on release
                </label>
            </div>

            <div class="lists-panel">
                <div class="word-list-box right-words">
                    <h3>Correct Words</h3>
                    <div class="scroll-container">
                        <ul id="right-list"></ul>
                    </div>
                </div>
                <div class="word-list-box wrong-words">
                    <h3>Incorrect Words</h3>
                    <div class="scroll-container">
                        <ul id="wrong-list"></ul>
                    </div>
                </div>
            </div>
        </section>
    </main>

</body>

</html>
